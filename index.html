<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Control Operativo — Checklists</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="root"></div>

  <!-- React (sin build step) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase (compat SDK, más simple para uso sin bundler) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <!-- Config e inicialización de Firebase -->
  <script src="js/firebase-config.js"></script>

  <!-- Módulos de la app (JSX, transformado en el navegador por Babel) -->
  <script type="text/babel" src="js/data.js"></script>
  <script type="text/babel" src="js/auth.js"></script>
  <script type="text/babel" src="js/checklist.js"></script>
  <script type="text/babel" src="js/dashboard.js"></script>
  <script type="text/babel" src="js/admin.js"></script>
  <script type="text/babel" src="js/app.js"></script>
</body>
</html>
